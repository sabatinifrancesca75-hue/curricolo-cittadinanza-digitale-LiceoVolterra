                { id: '4', label: 'Competenze & Traguardi', icon: Info },

                { id: 'scheda', label: 'Scheda Operativa', icon: FileText, isSpecial: true },

                    ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}

                        const isActive = activeSection === item.id;

                                setActiveSection(item.id);

                                ${item.id === 'piani' && !isActive ? 'hover:bg-indigo-50 hover:text-indigo-700' : ''}
                                ${item.id === 'piani' && isActive ? 'bg-indigo-100 text-indigo-700' : ''}
                                `}
                            >
                                <Icon className={`w-5 h-5 mr-3 
                                    ${isActive && !item.isSpecial && item.id !== 'piani' ? 'text-blue-600' : ''}
