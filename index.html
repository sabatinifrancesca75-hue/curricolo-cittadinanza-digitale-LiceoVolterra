<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curricolo Cittadinanza Digitale - Liceo Volterra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .pulse-btn { animation: pulse-orange 2s infinite; }
        @keyframes pulse-orange {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245, 124, 0, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(245, 124, 0, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245, 124, 0, 0); }
        }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (!containerRef.current || !window.lucide || !name) return;
                containerRef.current.innerHTML = '';
                const i = document.createElement('i');
                i.setAttribute('data-lucide', name);
                containerRef.current.appendChild(i);
                window.lucide.createIcons({ root: containerRef.current, attrs: { width: size, height: size } });
            }, [name, size]);
            return <span ref={containerRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        const App = () => {
            const [currentPage, setCurrentPage] = useState(0);
            const [aiLoading, setAiLoading] = useState(false);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [modalContent, setModalContent] = useState({ title: '', body: '' });
            const [selectedOutcomes, setSelectedOutcomes] = useState([]);
            const [selectedLevel, setSelectedLevel] = useState('');
            const [selectedDiscipline, setSelectedDiscipline] = useState('');

            const totalPages = 18;
            const apiKey = ""; // Inserire API Key per abilitare la IA

            const nextPage = () => setCurrentPage((prev) => Math.min(prev + 1, totalPages - 1));
            const prevPage = () => setCurrentPage((prev) => Math.max(prev - 1, 0));
            const goToPage = (pageIndex) => setCurrentPage(pageIndex);

            const learningOutcomes = [
                { area: "Area 1: Informazioni e dati", id: "1.1", text: "Articolare i bisogni informativi, cercare dati e informazioni.", icon: "search" },
                { area: "Area 1: Informazioni e dati", id: "1.2", text: "Valutare criticamente l'attendibilità delle fonti.", icon: "check-circle" },
                { area: "Area 2: Comunicazione", id: "2.1", text: "Interagire attraverso tecnologie digitali.", icon: "message-square" },
                { area: "Area 2: Comunicazione", id: "2.3", text: "Esercitare la cittadinanza attraverso servizi digitali.", icon: "globe" },
                { area: "Area 3: Creazione contenuti", id: "3.1", text: "Sviluppare e gestire contenuti digitali.", icon: "pen-tool" },
                { area: "Area 4: Sicurezza", id: "4.1", text: "Proteggere dispositivi e contenuti (Cybersecurity).", icon: "lock" },
                { area: "Area 4: Sicurezza", id: "4.2", text: "Protezione dei dati personali e della privacy (GDPR).", icon: "shield" },
                { area: "Area 4: Benessere", id: "4.3", text: "Tutelare la salute e il benessere (Cyberbullismo).", icon: "activity" },
                { area: "Area 4: Sostenibilità", id: "4.4", text: "Comprendere l'impatto ambientale delle tecnologie.", icon: "leaf" },
                { area: "Area 5: Problem Solving", id: "5.1", text: "Risolvere problemi tecnici.", icon: "wrench" },
                { area: "Area 5: Problem Solving", id: "5.2", text: "Individuare bisogni e risposte tecnologiche.", icon: "target" },
                { area: "Area 5: Problem Solving", id: "5.3", text: "Usare tecnologie in modo creativo.", icon: "zap" }
            ];

            const rubricheData = {
                C10: [
                    { id: "10.1", titolo: "Validazione epistemologica", livelli: [
                        "Ricerca informazioni online in modo poco mirato e non distingue chiaramente tra fonti affidabili e non affidabili.", 
                        "Ricerca informazioni pertinenti e riconosce alcune caratteristiche delle fonti attendibili con il supporto del docente.", 
                        "Confronta fonti diverse, verifica l'attendibilità delle informazioni e distingue fatti, opinioni e interpretazioni.", 
                        "Valida informazioni e dataset complessi applicando il metodo scientifico e riconoscendo fenomeni di disinformazione e bias algoritmici."
                    ] },
                    { id: "10.2", titolo: "Dati e modelli", livelli: [
                        "Legge grafici o dati digitali con difficoltà, mostrando una visione frammentata delle informazioni.", 
                        "Interpreta grafici e dataset semplici riconoscendo le informazioni principali fornite dal docente.", 
                        "Analizza grafici e dataset distinguendo tra dato e interpretazione e individuando relazioni significative.", 
                        "Analizza dataset complessi e riconosce limiti, distorsioni e bias nei modelli algoritmici, valutandone l'impatto."
                    ] },
                    { id: "10.3", titolo: "Produzione responsabile", livelli: [
                        "Produce contenuti digitali semplici senza citare sempre le fonti utilizzate.", 
                        "Produce contenuti citando le fonti principali e rispettando alcune regole di base del copyright.", 
                        "Integra fonti diverse citandole correttamente e rielaborando le informazioni in modo coerente.", 
                        "Produce contenuti originali e argomentati, dichiarando l'uso di IA e rispettando l'etica del copyright."
                    ] }
                ],
                C11: [
                    { id: "11.1", titolo: "Adeguatezza comunicativa", livelli: [
                        "Comunica negli ambienti digitali senza considerare pienamente il contesto e i diversi destinatari.", 
                        "Utilizza un linguaggio adeguato nei principali contesti digitali e rispetta le regole fondamentali della netiquette.", 
                        "Adatta con consapevolezza il registro comunicativo al contesto e ai destinatari utilizzando modalità appropriate.", 
                        "Gestisce consapevolmente la comunicazione pubblica e l'identità digitale con rigore etico."
                    ] },
                    { id: "11.2", titolo: "Argomentazione razionale", livelli: [
                        "Espone opinioni e informazioni senza ricorrere a fonti verificabili.", 
                        "Espone le proprie idee utilizzando alcune fonti di riferimento suggerite.", 
                        "Costruisce argomentazioni coerenti utilizzando fonti affidabili e dati per sostenere la propria tesi.", 
                        "Modera discussioni online riconoscendo disinformazione e polarizzazione, promuovendo il rigore comunicativo."
                    ] },
                    { id: "11.3", titolo: "Collaborazione digitale", livelli: [
                        "Partecipa con difficoltà ad attività collaborative online e richiede guida costante.", 
                        "Collabora in attività digitali guidate rispettando i ruoli assegnati e le consegne.", 
                        "Collabora attivamente alla produzione di contenuti condivisi e alla gestione di ambienti cloud.", 
                        "Coordina o facilita processi collaborativi digitali e la costruzione condivisa di conoscenza in contesti complessi."
                    ] }
                ],
                C12: [
                    { id: "12.1", titolo: "Identità digitale e dati", livelli: [
                        "Ha scarsa consapevolezza della gestione dei propri dati personali online.", 
                        "Comprende il concetto di privacy e utilizza alcune impostazioni di sicurezza base.", 
                        "Gestisce con consapevolezza i propri dati personali e riflette criticamente sull'impronta digitale.", 
                        "Analizza criticamente i fenomeni di profilazione, reputazione online e l'uso dei dati personali su larga scala."
                    ] },
                    { id: "12.2", titolo: "Sicurezza digitale", livelli: [
                        "Non riconosce facilmente le minacce digitali comuni e i rischi della rete.", 
                        "Riconosce alcune minacce digitali e applica semplici misure di protezione suggerite.", 
                        "Applica autonomamente comportamenti sicuri nell'uso di dispositivi e servizi digitali differenti.", 
                        "Analizza situazioni di rischio digitale e adotta strategie di sicurezza efficaci basate sull'analisi del rischio."
                    ] },
                    { id: "12.3", titolo: "Benessere e sostenibilità", livelli: [
                        "Non sempre riconosce gli effetti dell'uso eccessivo o scorretto delle tecnologie.", 
                        "Riconosce comportamenti digitali potenzialmente dannosi per la salute e le relazioni.", 
                        "Applica strategie personali di uso equilibrato e consapevole delle tecnologie.", 
                        "Analizza l'impatto ambientale delle tecnologie e promuove attivamente pratiche digitali sostenibili."
                    ] }
                ]
            };

            const handleGenerateActivity = async () => {
                if (selectedOutcomes.length === 0 || !selectedLevel || !selectedDiscipline) return;
                setAiLoading(true);
                const outcomesText = selectedOutcomes.map(o => `[${o.id}] ${o.text}`).join(", ");
                const prompt = `Progetta un'attività didattica di 2 ore per il Liceo Scientifico (Target: ${selectedLevel}, Disciplina: ${selectedDiscipline}) focalizzata su: ${outcomesText}. Usa il metodo scientifico e fai riferimento al framework DigComp 3.0. Rispondi in italiano in formato Markdown.`;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) 
                    });
                    const result = await response.json();
                    setModalContent({ title: `Laboratorio: ${selectedDiscipline}`, body: result.candidates?.[0]?.content?.parts?.[0]?.text });
                    setIsModalOpen(true);
                } catch (e) { 
                    setModalContent({ title: "Errore", body: "Inserire una API Key valida nel codice sorgente." }); 
                    setIsModalOpen(true); 
                }
                setAiLoading(false);
            };

            const toggleOutcome = (outcome) => {
                if (selectedOutcomes.find(o => o.id === outcome.id)) {
                    setSelectedOutcomes(selectedOutcomes.filter(o => o.id !== outcome.id));
                } else if (selectedOutcomes.length < 2) {
                    setSelectedOutcomes([...selectedOutcomes, outcome]);
                }
            };

            const SectionHeader = ({ num, title }) => (
                <div className="mb-6 shrink-0">
                    <div className="flex items-center gap-2 mb-1">
                        <div className="h-[2px] w-8 bg-blue-600"></div>
                        <span className="text-[10px] font-bold text-blue-600 uppercase">Sezione {num}</span>
                    </div>
                    <h2 className="text-3xl font-black text-slate-900 uppercase leading-tight">{title}</h2>
                </div>
            );

            const renderRubrica = (title, data) => (
                <div className="flex-1 flex flex-col overflow-hidden">
                    <h3 className="text-lg font-bold text-slate-700 mb-4 uppercase">{title}</h3>
                    <div className="flex-1 overflow-auto rounded-3xl border border-slate-200 bg-white shadow-sm custom-scrollbar">
                        <table className="w-full text-[11px] border-collapse">
                            <thead className="sticky top-0 bg-slate-900 text-white">
                                <tr>
                                    <th className="p-4 text-left w-1/5">Traguardo</th>
                                    <th className="p-4 border-l border-white/10 w-1/5">Iniziale</th>
                                    <th className="p-4 border-l border-white/10 w-1/5">Base</th>
                                    <th className="p-4 border-l border-white/10 w-1/5">Intermedio</th>
                                    <th className="p-4 border-l border-white/10 w-1/5">Avanzato</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100 text-slate-600">
                                {data.map((t, i) => (
                                    <tr key={i} className="hover:bg-slate-50">
                                        <td className="p-4 font-bold bg-slate-50 text-slate-900">
                                            {t.id}<br></br>
                                            <span className="text-[9px] uppercase opacity-50">{t.titolo}</span>
                                        </td>
                                        {t.livelli.map((l, j) => (
                                            <td key={j} className="p-4 border-l border-slate-100 leading-relaxed">{l}</td>
                                        ))}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );

            const renderPage = () => {
                switch(currentPage) {
                    case 0: return (
                        <div className="flex-1 flex flex-col justify-center items-center text-center p-6">
                            <div className="mb-8 p-4 bg-blue-50 text-blue-600 rounded-3xl">
                                <Icon name="globe" size={48} />
                            </div>
                            <span className="text-sm font-black text-blue-600 uppercase tracking-widest">Liceo Scientifico Volterra</span>
                            <h1 className="text-6xl font-black text-slate-900 leading-none mb-8">
                                CURRICOLO DI<br></br>
                                <span className="text-blue-600">CITTADINANZA<br></br>DIGITALE</span>
                            </h1>
                            <div className="w-32 h-2 bg-orange-500 rounded-full mb-12"></div>
                            <p className="text-slate-400 font-bold max-w-sm uppercase">Documento Integrale per PTOF</p>
                            <button onClick={nextPage} className="no-print bg-slate-900 text-white px-16 py-6 rounded-3xl font-black uppercase tracking-widest shadow-2xl hover:bg-blue-600 transition-all transform hover:-translate-y-1 mt-8">
                                Consulta ✨
                            </button>
                        </div>
                    );
                    case 1: return (
                        <div className="h-full flex flex-col">
                            <SectionHeader num="0" title="Indice del Curricolo" />
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mt-4 overflow-y-auto pr-2 custom-scrollbar">
                                {[
                                    {t:"1. Premessa (1.1-1.3)", p:2},
                                    {t:"1. Premessa (1.4-1.6)", p:3},
                                    {t:"2. Framework DigComp 3.0", p:4},
                                    {t:"3. Intelligenza Artificiale", p:5},
                                    {t:"4. Struttura e Traguardi", p:6},
                                    {t:"4.3 Mappatura - Comp 10", p:7},
                                    {t:"4.3 Mappatura - Comp 11", p:8},
                                    {t:"4.3 Mappatura - Comp 12", p:9},
                                    {t:"4.4 Integrazione Discipline", p:10},
                                    {t:"5. Progressione Verticale", p:11},
                                    {t:"6. Rubrica Valutazione C10", p:12},
                                    {t:"6. Rubrica Valutazione C11", p:13},
                                    {t:"6. Rubrica Valutazione C12", p:14},
                                    {t:"7. Laboratorio Competenze", p:15},
                                    {t:"8. Valutazione e Monitoraggio", p:16},
                                    {t:"Esportazione Ufficiale", p:17}
                                ].map((item, i) => (
                                    <button key={i} onClick={() => goToPage(item.p)} className="text-left p-4 bg-white rounded-2xl border border-slate-100 hover:border-blue-500 hover:shadow-lg flex justify-between items-center group transition-all">
                                        <span className="font-bold text-slate-700 text-[11px] group-hover:text-blue-600">{item.t}</span>
                                        <Icon name="chevron-right" size={14} className="text-slate-200 group-hover:text-blue-500" />
                                    </button>
                                ))}
                            </div>
                        </div>
                    );
                    case 2: return (
                        <div className="space-y-6 overflow-y-auto pr-2 custom-scrollbar">
                            <SectionHeader num="1" title="Premessa Metodologica" />
                            <div className="p-6 bg-white rounded-3xl shadow-sm border border-slate-100">
                                <h4 className="font-black text-blue-600 text-xs uppercase mb-4">1.1 Finalità del curricolo</h4>
                                <ul className="text-xs text-slate-700 space-y-2 list-disc pl-4 leading-relaxed">
                                    <li>Promuovere lo sviluppo della cittadinanza digitale come competenza chiave europea.</li>
                                    <li>Integrare competenze tecnologiche, pensiero critico e responsabilità etico-civile.</li>
                                    <li>Sostenere l'uso consapevole, sicuro e creativo delle tecnologie nei contesti di studio e vita.</li>
                                </ul>
                            </div>
                            <div className="p-6 bg-white rounded-3xl shadow-sm border border-slate-100">
                                <h4 className="font-black text-blue-600 text-xs uppercase mb-4">1.2 Principi pedagogici</h4>
                                <ul className="text-xs text-slate-700 space-y-2 list-disc pl-4 leading-relaxed">
                                    <li>Centralità del metodo scientifico (osservare, analizzare, verificare, argomentare).</li>
                                    <li>Apprendimento attivo e situato (compiti autentici, problem solving, project work).</li>
                                    <li>Interdisciplinarità e trasversalità alle discipline.</li>
                                    <li>Inclusione e personalizzazione dei percorsi.</li>
                                </ul>
                            </div>
                            <div className="p-6 bg-slate-900 text-white rounded-3xl shadow-sm border border-slate-100">
                                <h4 className="font-black text-orange-500 text-xs uppercase mb-4">1.3 Struttura delle competenze</h4>
                                <ul className="text-xs text-slate-300 space-y-2 list-disc pl-4 leading-relaxed">
                                    <li>Riferimento alle Competenze 10, 11, 12 dell'Educazione Civica.</li>
                                    <li>Declinazione in traguardi di uscita osservabili.</li>
                                    <li>Articolazione in livelli di padronanza (Iniziale, Base, Intermedio, Avanzato).</li>
                                </ul>
                            </div>
                        </div>
                    );
                    case 3: return (
                        <div className="space-y-6 overflow-y-auto pr-2 custom-scrollbar">
                            <SectionHeader num="1" title="Progressione e Metodi" />
                            <div className="p-6 bg-white rounded-3xl border border-slate-100 shadow-sm">
                                <h4 className="font-black text-blue-600 text-xs uppercase mb-4">1.4 Progressione didattica</h4>
                                <ul className="text-xs text-slate-700 space-y-2 list-disc pl-4 leading-relaxed">
                                    <li>Biennio: alfabetizzazione guidata e sviluppo della consapevolezza.</li>
                                    <li>Triennio: autonomia, valutazione critica e responsabilità.</li>
                                    <li>Progressione coerente con i livelli DigComp (Basic → Intermediate → Advanced).</li>
                                </ul>
                            </div>
                            <div className="p-6 bg-white rounded-3xl border border-slate-100 shadow-sm">
                                <h4 className="font-black text-blue-600 text-xs uppercase mb-4">1.5 Metodologie didattiche</h4>
                                <ul className="text-xs text-slate-700 space-y-2 list-disc pl-4 leading-relaxed">
                                    <li>Compiti autentici e situazioni-problema.</li>
                                    <li>Didattica laboratoriale e digitale.</li>
                                    <li>Cooperative learning e peer education.</li>
                                    <li>Uso consapevole di strumenti digitali e ambienti collaborativi.</li>
                                </ul>
                            </div>
                            <div className="p-6 bg-orange-50 rounded-3xl border border-orange-100 shadow-sm">
                                <h4 className="font-black text-orange-600 text-xs uppercase mb-4">1.6 Strumenti e ambienti</h4>
                                <ul className="text-xs text-slate-700 space-y-2 list-disc pl-4 leading-relaxed">
                                    <li>Piattaforme di apprendimento digitale (LMS, cloud collaborativi).</li>
                                    <li>Strumenti per la ricerca e l'analisi dei dati.</li>
                                    <li>Applicazioni per la creazione di contenuti multimediali.</li>
                                    <li>Banche dati e motori di ricerca.</li>
                                </ul>
                            </div>
                        </div>
                    );
                    case 4: return (
                        <div className="h-full flex flex-col">
                            <SectionHeader num="2" title="Framework DigComp 3.0" />
                            <div className="p-8 bg-blue-600 text-white rounded-[3rem] shadow-xl mb-6">
                                <p className="text-sm leading-relaxed mb-4">Il curricolo fa riferimento alle cinque aree di competenza del framework DigComp 3.0. L'aggiornamento alla versione 3.0 integra le dimensioni relative all'Intelligenza Artificiale, alla disinformazione, al benessere e alla sostenibilità ambientale.</p>
                            </div>
                            <div className="grid grid-cols-1 gap-2 overflow-y-auto pr-2 custom-scrollbar">
                                {[
                                    { t: "1) Alfabetizzazione su informazioni e dati", i: "search" }, 
                                    { t: "2) Comunicazione e collaborazione", i: "message-square" }, 
                                    { t: "3) Creazione di contenuti digitali", i: "pen-tool" }, 
                                    { t: "4) Sicurezza, benessere e sostenibilità", i: "shield-check" }, 
                                    { t: "5) Risoluzione di problemi", i: "wrench" }
                                ].map((area, i) => (
                                    <div key={i} className="p-4 bg-white rounded-2xl border border-slate-100 flex items-center gap-4">
                                        <div className="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center font-black text-blue-600">
                                            <Icon name={area.i} size={18} />
                                        </div>
                                        <span className="text-xs font-bold text-slate-700">{area.t}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                    case 5: return (
                        <div className="h-full flex flex-col">
                            <SectionHeader num="3" title="Dimensione IA" />
                            <div className="p-8 bg-white border border-slate-100 rounded-[3rem] space-y-6 shadow-sm">
                                <h4 className="font-black text-orange-500 text-sm uppercase">3. Dimensione trasversale dell'Intelligenza Artificiale</h4>
                                <p className="text-sm font-bold text-slate-900 border-l-4 border-orange-500 pl-4 leading-relaxed">
                                    L'Intelligenza Artificiale è considerata una competenza trasversale. Gli studenti sono guidati a:
                                </p>
                                <div className="space-y-4 mt-6">
                                    <div className="flex gap-4 items-center">
                                        <div className="p-3 bg-slate-100 text-blue-600 rounded-xl"><Icon name="cpu" /></div>
                                        <p className="text-xs text-slate-700"><strong>Comprendere</strong> il funzionamento di base dei sistemi algoritmici e generativi.</p>
                                    </div>
                                    <div className="flex gap-4 items-center">
                                        <div className="p-3 bg-slate-100 text-blue-600 rounded-xl"><Icon name="eye-off" /></div>
                                        <p className="text-xs text-slate-700"><strong>Riconoscere</strong> limiti, allucinazioni e bias dei contenuti prodotti da IA.</p>
                                    </div>
                                    <div className="flex gap-4 items-center">
                                        <div className="p-3 bg-slate-100 text-blue-600 rounded-xl"><Icon name="pen-tool" /></div>
                                        <p className="text-xs text-slate-700"><strong>Utilizzare</strong> strumenti di IA in modo trasparente (dichiarando l'uso del prompt).</p>
                                    </div>
                                    <div className="flex gap-4 items-center">
                                        <div className="p-3 bg-slate-100 text-blue-600 rounded-xl"><Icon name="user-check" /></div>
                                        <p className="text-xs text-slate-700"><strong>Distinguere</strong> tra contenuti umani e generati, esercitando supervisione (Human-in-the-loop).</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                    case 6: return (
                        <div className="space-y-6 overflow-y-auto pr-2 custom-scrollbar">
                            <SectionHeader num="4.1-4.2" title="Struttura e Traguardi" />
                            <div className="p-6 bg-white border border-slate-100 shadow-sm rounded-3xl">
                                <h4 className="font-black text-blue-600 text-xs uppercase mb-4">4.1 Competenze di Educazione Civica (10-11-12)</h4>
                                <p className="text-xs text-slate-700 leading-relaxed mb-4">
                                    Il curricolo si struttura attorno alle tre competenze digitali previste dalle Linee Guida per l'insegnamento dell'Educazione Civica:
                                </p>
                                <ul className="text-xs text-slate-700 space-y-2 list-disc pl-4 leading-relaxed">

                                <div className="flex flex-col items-center">
                                    <span className="text-[9px] font-black text-slate-300 uppercase tracking-[0.2em] mb-1">Pagina</span>
                                    <span className="text-sm font-black text-slate-900">{currentPage+1} / {totalPages}</span>
                                </div>
                                <button onClick={nextPage} disabled={currentPage===totalPages-1} className="flex items-center gap-3 text-xs font-black uppercase text-slate-900 disabled:opacity-10 hover:text-blue-600 transition-colors">
                                    Avanti <Icon name="chevron-right" strokeWidth={3} />
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
